<!DOCTYPE html>
<html lang="en">
<head>
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Algorithm Visualizer</h1>

<div class="controls">
    <input type="text" id="arrayInput" placeholder="Enter numbers (e.g. 5 3 2 8)">
    <button onclick="createArray()">Create Array</button>
    <button onclick="generateRandom()">Random Array</button>
    
    <input type="range" id="speedRange" min="50" max="1000" value="300">
    
    <button onclick="resetArray()">Reset</button>
    <button onclick="bubbleSort()">Bubble Sort</button>
    <button onclick="selectionSort()">Selection Sort</button>
    <button onclick="insertionSort()">Insertion Sort</button>
    <button onclick="mergeSort()">Merge Sort</button>
    <button onclick="quickSort()">Quick Sort</button>
    <button onclick="binarySearch()">Binary Search</button>
</div>

<div id="container"></div>

<hr>

<h3>Create Graph (Use: A B 2)</h3>

<textarea id="edgesInput" rows="6" cols="40"
placeholder="A B 2
A C 4
B D 1"></textarea>

<br><br>

<button onclick="generateGraph()">Generate Graph</button>
<button onclick="bfs()">BFS</button>
<button onclick="dfs()">DFS</button>

<p id="result"></p>
<div id="info"></div>

<div id="graph-container">
    <svg id="edges"></svg>
    <div id="nodes"></div>
</div>

<script src="script.js"></script>

</body>
</html>
